title:"Postura Correta",content:"Mantenha as costas apoiadas no encosto, pés no apoio e mãos no volante. Evite torcer o tronco ao olhar para trás — gire todo o corpo. Pausas regulares previnem lesões por esforço repetitivo.",category:"ergonomia",emoji:"🪑"},{id:5,title:"Buzine nos Cruzamentos",content:"Sempre use a buzina ao se aproximar de cruzamentos, portas e áreas cegas. Mesmo que não veja ninguém, um pedestre pode estar prestes a entrar na sua trajetória.",category:"seguranca",emoji:"📢"},{id:6,title:"Garfos na Altura Certa",content:"Durante o transporte, mantenha os garfos entre 15 e 20 cm do chão. Alto demais = risco de tombamento. Baixo demais = risco de batida em irregularidades do piso.",category:"operacao",emoji:"📏"},{id:7,title:"Hidratação e Pausas",content:"Beba água regularmente, especialmente em ambientes quentes. Faça pausas de 5 minutos a cada hora para descansar a vista e alongar o corpo. Operador descansado é operador seguro.",category:"ergonomia",emoji:"💧"},{id:8,title:"Carga Estável Antes de Mover",content:"Antes de movimentar, certifique-se de que a carga está estável, bem apoiada nos garfos e inclinada para trás. Uma carga instável pode cair a qualquer momento.",category:"operacao",emoji:"⚖️"},{id:9,title:"Verifique os Pneus",content:"Pneus desgastados ou danificados reduzem a estabilidade e a capacidade de frenagem. Verifique visualmente a cada turno e reporte qualquer irregularidade.",category:"manutencao",emoji:"🛞"},{id:10,title:"Não Transporte Pessoas",content:"Nunca transporte pessoas nos garfos, na carroceria ou em qualquer parte da empilhadeira. Isso é proibido por norma e pode causar acidentes fatais.",category:"seguranca",emoji:"🚫"},{id:11,title:"Ajuste os Espelhos",content:"Antes de iniciar o turno, ajuste os espelhos retrovisores para maximizar sua visão. Limpe-os se necessário. Um operador que não enxerga bem é um operador em risco.",category:"operacao",emoji:"🪞"},{id:12,title:"Cuidado com Cargas Empilhadas",content:"Ao passar por pilhas de carga, mantenha distância lateral. Cargas mal empilhadas podem cair sobre a empilhadeira. Reporte empilhamentos irregulares ao supervisor.",category:"seguranca",emoji:"📦"},{id:13,title:"Bateria: Nível de Água",content:"Verifique o nível de água destilada das baterias semanalmente. O nível deve cobrir as placas. Use apenas água destilada — água da torneira danifica as baterias.",category:"manutencao",emoji:"🔋"},{id:14,title:"Alongamentos no Trabalho",content:"A cada 2 horas, faça alongamentos simples: pescoço, ombros, costas, braços e pernas. Previne dores, lesões e melhora a concentração durante a operação.",category:"ergonomia",emoji:"🧘"},{id:15,title:"Respeite a Sinalização",content:"Faixas no chão, placas de limite de velocidade e sinalizações de pedestres existem para sua segurança. Respeite todas as marcações do piso e sinalizações do armazém.",category:"seguranca",emoji:"⚠️"}],Lt=[{id:1,question:"Qual a altura correta dos garfos durante o transporte de cargas?",options:["O mais alto possível para evitar obstáculos","15 a 20 cm do chão","Renteados ao chão","50 cm do chão"],correctAnswer:1,explanation:"Os garfos devem estar entre 15 e 20 cm do chão durante o transporte. Mais alto compromete a estabilidade, mais baixo pode bater em irregularidades."},{id:2,question:"Em caso de tombamento da empilhadeira, o que o operador deve fazer?",options:["Pular para fora rapidamente","Ficar na cabine, segurar o volante e inclinar-se para o lado oposto","Tentar saltar para o lado","Gritar por ajuda e esperar"],correctAnswer:1,explanation:"Nunca tente pular! A estrutura de proteção (ROPS) foi projetada para protegê-lo. Fique na cabine, segure firme o volante e incline-se para o lado oposto ao tombamento."},{id:3,question:"Qual a NR que regulamenta o transporte e movimentação de materiais?",options:["NR-6","NR-10","NR-11","NR-12"],correctAnswer:2,explanation:"A NR-11 estabelece os requisitos de segurança para operações de transporte, movimentação, armazenagem e manuseio de materiais."},{id:4,question:"Ao subir uma rampa com carga, a carga deve ficar:",options:["Voltada para trás (descendo a rampa)","Voltada para cima (subindo a rampa)","Lateral à rampa","Não importa a posição"],correctAnswer:1,explanation:"Ao subir rampas, a carga deve estar voltada para cima (à frente). Ao descer, a empilhadeira deve dar ré com a carga voltada para cima. Isso mantém a estabilidade."},{id:5,question:"Qual é o formato que representa a estabilidade da empilhadeira?",options:["Quadrado de estabilidade","Círculo de estabilidade","Triângulo de estabilidade","Retângulo de estabilidade"],correctAnswer:2,explanation:"O triângulo de estabilidade é formado pelos dois pontos das rodas dianteiras e o ponto central do eixo traseiro (eixo oscilante). O centro de gravidade deve permanecer dentro desse triângulo."},{id:6,question:"O operador pode recusar-se a operar em condições inseguras?",options:["Não, deve obedecer o supervisor","Sim, é um direito do trabalhador","Apenas se houver risco de morte","Depende da empresa"],correctAnswer:1,explanation:"O trabalhador tem o direito de recusar-se a operar em condições inseguras sem sofrer retaliação. A segurança é prioridade e está prevista nas normas regulamentadoras."},{id:7,question:"O uso de celular durante a operação da empilhadeira é:",options:["Permitido em trajetos curtos","Permitido se usar viva-voz","Proibido","Permitido apenas para ligar ao supervisor"],correctAnswer:2,explanation:"O uso de celular durante a operação é PROIBIDO. A atenção deve ser total à operação e ao ambiente ao redor."},{id:8,question:"Em piso molhado, qual a recomendação de velocidade?",options:["Manter a velocidade normal","Reduzir em pelo menos 50%","Acelerar para passar rápido","Parar a operação completamente"],correctAnswer:1,explanation:"Em piso molhado, reduza a velocidade em pelo menos 50%, evite frenagens bruscas e aumente a distância de segurança."},{id:9,question:"Ao transportar carga em rampa descendente, o operador deve:",options:["Descer de frente com a carga à frente","Descer de ré com a carga voltada para cima","Descer em zigue-zague","Descer com os garfos elevados"],correctAnswer:1,explanation:"Ao descer uma rampa, a empilhadeira deve dar ré com a carga voltada para cima (para o topo da rampa). Isso evita que a carga deslize e mantém a estabilidade."},{id:10,question:"Quantas vezes por turno deve ser feita a inspeção pré-operacional?",options:["Uma vez por semana","Uma vez ao dia","Antes de cada turno de trabalho","Apenas quando o supervisor solicitar"],correctAnswer:2,explanation:"A inspeção pré-operacional deve ser realizada ANTES de cada turno de trabalho. É obrigatória e deve ser registrada em checklist."},{id:11,question:"O que fazer ao identificar um vazamento na empilhadeira?",options:["Continuar operando até o fim do turno","Colocar um recipiente embaixo e continuar","Parar a operação e comunicar ao supervisor","Tentar consertar sozinho"],correctAnswer:2,explanation:"Ao identificar qualquer anomalia como vazamentos, pare a operação imediatamente e comunique ao supervisor. Não tente consertar se não for qualificado."},{id:12,question:"Qual a velocidade máxima recomendada em áreas internas de armazém?",options:["20 km/h","15 km/h","10 km/h","5 km/h"],correctAnswer:2,explanation:"A velocidade máxima em áreas internas geralmente é de 10 km/h, mas pode variar conforme a empresa. Respeite sempre a sinalização do local."},{id:13,question:"Ao empilhar, quando o operador deve inclinar o mastro para frente?",options:["Ao se aproximar da prateleira","Quando a carga ultrapassa a altura desejada","Ao retirar a carga do palete","Durante todo o transporte"],correctAnswer:1,explanation:"Ao empilhar, eleve a carga até ultrapassar a altura do nível desejado, então incline o mastro para frente e abaixe suavemente sobre a prateleira."},{id:14,question:"Qual tipo de água deve ser usada nas baterias das empilhadeiras elétricas?",options:["Água da torneira","Água mineral","Água destilada","Qualquer tipo de água"],correctAnswer:2,explanation:"Use APENAS água destilada nas baterias. Água da torneira ou mineral contém minerais que danificam as placas das baterias."},{id:15,question:'O que significa o termo "centro de carga" em empilhadeiras?',options:["O local onde a empilhadeira é estacionada","O ponto de equilíbrio da carga sobre os garfos","A central de comando do armazém","O centro geométrico da empilhadeira"],correctAnswer:1,explanation:"O centro de carga é o ponto de equilíbrio da carga sobre os garfos. Ele influencia diretamente na estabilidade e na capacidade efetiva da empilhadeira."}],cs=[{id:"operacao-basica",title:"Operação Básica",icon:"🏗️",description:"Fundamentos da operação de empilhadeira, controles e movimentos essenciais.",color:"from-blue-500 to-blue-600",lessons:[{id:"ob-1",title:"Conhecendo a Empilhadeira",content:["A empilhadeira é um equipamento essencial em armazéns e centros de distribuição, projetada para elevar, transportar e empilhar cargas.","Os principais tipos incluem: empilhadeira elétrica, empilhadeira a gás (GLP), empilhadeira a diesel e empilhadeira patolada.","Cada tipo possui características específicas de operação e manutenção que devem ser conhecidas pelo operador.","A capacidade de carga varia conforme o modelo — nunca exceda o limite indicado na placa de identificação do equipamento.","O centro de carga é o ponto de equilíbrio da carga e influencia diretamente na estabilidade da empilhadeira."],highlights:["Sempre verifique a placa de capacidade antes de operar","Conheça o tipo de empilhadeira que irá operar","Respeite o limite de carga especificado pelo fabricante"],warnings:["Nunca opere uma empilhadeira sem ter recebido treinamento adequado e certificação"]},{id:"ob-2",title:"Controles e Instrumentos",content:["O painel de instrumentos indica informações vitais: nível de combustível/bateria, temperatura, horímetro e alertas de falhas.","Os principais comandos incluem: volante/direção, pedais (acelerador, freio, embreagem), alavanca de câmbio e alavancas hidráulicas.","As alavancas hidráulicas controlam: elevação da lança, inclinação do mastro, deslocamento lateral (quando equipado) e garfos auxiliares.","Os espelhos retrovisores e luzes de advertência devem estar sempre funcionando corretamente.","Antes de dar partida, verifique se o freio de estacionamento está acionado e a alavanca de câmbio em ponto morto."],highlights:["Familiarize-se com todos os controles antes de iniciar a operação","Verifique todos os instrumentos do painel diariamente","Mantenha os espelhos retrovisores limpos e ajustados"]},{id:"ob-3",title:"Movimentos Fundamentais",content:["Antes de movimentar a empilhadeira, eleve os garfos a 15-20 cm do chão — nunca transporte com os garfos elevados.","Incline o mastro levemente para trás ao transportar cargas para maior estabilidade.","Mantenha velocidade reduzida, especialmente em curvas, pisos irregulares ou áreas com pedestres.","Ao fazer curvas, reduza a velocidade antes de entrar na curva — nunca freie bruscamente durante a curva.","Mantenha distância segura de pelo menos 3 metros de distância de outros veículos e pedestres.","Em rampas, sempre transporte a carga voltada para cima: suba com a carga à frente e desça com a carga voltada para a rampa."],highlights:["Garfos a 15-20 cm do chão durante o transporte","Mastro inclinado para trás ao transportar cargas","Carga sempre voltada para cima em rampas","Distância mínima de 3 metros de outros veículos"],warnings:["Nunca desça uma rampa com a carga à frente — risco de tombamento!","Nunca transporte cargas com os garfos elevados"]},{id:"ob-4",title:"Noções Técnicas: Tipos e Componentes da Empilhadeira",content:["No conteúdo de reciclagem NR-11, as empilhadeiras são classificadas por propulsão (elétrica, combustão e GLP/GNV), equilíbrio (contrabalançada, patolada, retrátil e trilateral) e transmissão (mecânica, hidráulica, hidrostática e elétrica).","Empilhadeiras elétricas têm menor emissão local e são muito usadas em ambientes internos; modelos de combustão exigem atenção extra com ventilação e emissão de gases.","A empilhadeira contrabalançada é versátil para percursos mais longos e rampas moderadas, enquanto modelos retráteis e trilaterais são comuns em corredores mais estreitos.","Componentes críticos incluem: chassi/contrapeso, torre de elevação, garfos, rodas, sistema hidráulico, freios, painel, buzina e sistema de direção.","No motor de combustão, os sistemas de alimentação, lubrificação e arrefecimento precisam de inspeção e manutenção preventiva para evitar falhas e desgaste acelerado.","Conhecer os comandos e símbolos do painel é requisito básico para prevenir uso incorreto e reação tardia a alertas de falha."],highlights:["Entenda o tipo de empilhadeira antes de operar","Conheça os componentes críticos e sua função","Observe painéis/alertas antes e durante a operação"],warnings:["Operar equipamento sem domínio técnico dos comandos e limitações aumenta risco de acidente grave"]}]},{id:"seguranca",title:"Segurança Operacional",icon:"🛡️",description:"Protocolos de segurança, EPIs, procedimentos de emergência e prevenção de acidentes.",color:"from-red-500 to-red-600",lessons:[{id:"seg-1",title:"EPIs e Equipamentos de Proteção",content:["Os EPIs obrigatórios para operação de empilhadeira incluem: capacete de segurança, calçado de segurança com biqueira de aço, colete refletivo e luvas de proteção.","O cinto de segurança é obrigatório e pode ser a diferença entre a vida e a morte em caso de tombamento.","Protetores auriculares são necessários em ambientes com nível de ruído elevado.","Óculos de proteção devem ser usados ao manusear produtos que possam gerar respingos ou partículas.","Todos os EPIs devem estar em bom estado de conservação e serem substituídos quando danificados.","A empresa deve fornecer os EPIs gratuitamente e fiscalizar o uso correto."],highlights:["Capacete, calçado de segurança, colete refletivo e luvas são obrigatórios","O cinto de segurança é NÃO NEGOCIÁVEL — use sempre!","Verifique o estado dos EPIs antes de cada turno"],warnings:["Nunca opere a empilhadeira sem cinto de segurança","EPIs danificados devem ser imediatamente substituídos"]},{id:"seg-2",title:"Prevenção de Acidentes",content:["Antes de iniciar a operação, faça uma inspeção visual da área: identifique obstáculos, pisos irregulares, áreas molhadas e pedestres.","Sinalize áreas de carga e descarga com cones, fitas ou barreiras físicas.","Use a buzina ao passar por cruzamentos, saídas de corredores e áreas com visibilidade reduzida.","Mantenha sempre contato visual com pedestres na área de operação.","Nunca permita pessoas debaixo dos garfos elevados — essa é uma das principais causas de acidentes fatais.","Em caso de tombamento, NUNTA tente pular para fora. Fique dentro da cabine, segure firme o volante e incline-se para o lado oposto do tombamento."],highlights:["Use a buzina em cruzamentos e áreas de visibilidade reduzida","NUNCA permita pessoas debaixo dos garfos elevados","Faça contato visual com pedestres na área de operação"],warnings:["Em caso de tombamento: NÃO pule! Fique na cabine, segure o volante e incline-se para o lado oposto","Nunca transporte pessoas nos garfos ou na empilhadeira"]},{id:"seg-3",title:"Procedimentos de Emergência",content:["Em caso de acidente, desligue imediatamente a empilhadeira, acione o freio de estacionamento e isole a área.","Preste os primeiros socorros se capacitado e acione imediatamente a equipe de segurança do trabalho e o SAMU (192).","Em caso de incêndio, use o extintor adequado (geralmente PQS ou CO₂) e acione o alarme de incêndio.","Em caso de vazamento de produtos perigosos, siga a Ficha de Informações de Segurança de Produtos Químicos (FISPQ).","Conheça a localização de todos os extintores, saídas de emergência e pontos de encontro da sua área.","Participe de todos os simulados de emergência e conheça os procedimentos da sua empresa."],highlights:["Conheça os números de emergência: SAMU (192), Bombeiros (193)","Saiba a localização dos extintores e saídas de emergência","Em emergências com produtos químicos, consulte a FISPQ"]},{id:"seg-4",title:"Zona de Perigo, Pedestres e Isolamento de Corredores",content:["Zona de perigo é toda área de deslocamento da empilhadeira e de elevação de carga onde pessoas podem se ferir por queda de material, choque ou tombamento.","Pessoas alheias à operação devem ser retiradas da área antes do início da tarefa, com isolamento por faixas/correntes nos dois lados do corredor quando aplicável.","A buzina e os sinais sonoros devem ser usados preventivamente em cruzamentos, entradas/saídas e aproximação de pedestres.","Se houver pedestre dentro da zona de risco, a operação deve ser interrompida imediatamente até a liberação da área.","O operador é responsável por não obstruir hidrantes, extintores, macas, painéis elétricos, saídas de emergência e rotas de circulação.","A segurança do entorno faz parte da qualidade operacional: proteger pessoas é prioridade acima de produtividade."],highlights:["Isole o corredor antes de iniciar movimentação crítica","Pare a operação ao identificar pedestres na área de risco","Nunca bloqueie rotas e equipamentos de emergência"],warnings:["Operar sem isolamento em área com fluxo de pessoas cria risco iminente de acidente"]}]},{id:"manutencao",title:"Manutenção Preventiva",icon:"🔧",description:"Inspeções diárias, cuidados com bateria/combustível e manutenção preventiva do equipamento.",color:"from-amber-500 to-amber-600",lessons:[{id:"man-1",title:"Inspeção Diária Pré-Operacional",content:["A inspeção pré-operacional é obrigatória e deve ser realizada ANTES de cada turno de trabalho.","Verifique os pneus: desgaste, cortes, pressão (pneumáticos) e presença de objetos estranhos.","Confira o nível de óleo hidráulico, óleo do motor (se aplicável), líquido de arrefecimento e fluido de freio.","Teste todos os sistemas: freios, direção, buzina, luzes, alarme de ré, indicadores do painel e cintos de segurança.","Inspecione os garfos: trincas, empenamentos, desgaste excessivo e travamento adequado.","Verifique se há vazamentos de óleo, combustível ou fluido hidráulico sob a empilhadeira.","Registre todas as inspeções no checklist diário e comunique qualquer anomalia ao supervisor."],highlights:["Inspeção pré-operacional é OBRIGATÓRIA antes de cada turno","Verifique pneus, fluidos, freios, luzes e garfos","Registre tudo no checklist e comunique anomalias"],warnings:["NÃO opere a empilhadeira se identificar falhas graves — reporte imediatamente"]},{id:"man-2",title:"Cuidados com Bateria e Combustível",content:["Empilhadeiras elétricas: verifique o nível da água das baterias semanalmente e mantenha os terminais limpos e protegidos.","A recarga deve ser feita em área ventilada, afastada de fontes de ignição e com equipamentos de proteção individual.","Nunca desconecte a bateria com a empilhadeira ligada — isso pode danificar o sistema elétrico.","Empilhadeiras a GLP: verifique o nível do botijão, conexões e mangueiras regularmente.","Troque o botijão de GLP em área aberta e ventilada, longe de fontes de calor ou faíscas.","Empilhadeiras a diesel: mantenha o tanque abastecido, use apenas combustível de qualidade e drene o separador de água regularmente."],highlights:["Recarga de baterias apenas em áreas ventiladas","Verifique o nível de água das baterias semanalmente","Troca de botijão GLP apenas em áreas abertas e ventiladas"],warnings:["Nunca fume próximo à área de recarga ou abastecimento","Nunca desconecte a bateria com o equipamento ligado"]},{id:"man-3",title:"Manutenção Programada",content:["Siga rigorosamente o plano de manutenção preventiva do fabricante, respeitando os intervalos de horas trabalhadas.","A lubrificação dos pontos de graxa deve ser feita conforme especificação do fabricante.","A substituição de filtros (óleo, ar, combustível, hidráulico) deve seguir o cronograma estabelecido.","Mantenha um histórico de manutenções para acompanhamento e rastreabilidade.","Qualquer alteração no comportamento do equipamento (ruídos, vibrações, perda de potência) deve ser comunicada imediatamente.","Somente pessoal qualificado e autorizado pode realizar manutenções corretivas no equipamento."],highlights:["Siga o plano de manutenção do fabricante","Mantenha histórico de todas as manutenções","Comunique qualquer alteração no comportamento do equipamento"]},{id:"man-4",title:"Bateria Tracionária: Recarga, Água e Prevenção de Incêndio",content:["A bateria tracionária exige controle de temperatura, limpeza e rotina de recarga conforme manual do fabricante para preservar vida útil e segurança.","Para recarregar: desligue o equipamento, retire a chave, abra o compartimento, verifique danos visíveis, conecte corretamente na estação e siga o procedimento oficial.","Durante manuseio, não coloque objetos sobre a bateria e confirme travas/portas laterais após montagem ou desmontagem.","A inspeção de nível de água deve seguir frequência definida pela empresa/fabricante (ex.: semanal ou quinzenal), usando água deionizada quando necessário.","Outras intervenções técnicas em bateria devem ser feitas por profissional habilitado; operador executa apenas inspeções e rotina autorizada.","Na área de recarga: ambiente ventilado, sem fumaça/chama/faísca e com meios de combate a incêndio disponíveis."],highlights:["Recarga e inspeção sempre com procedimento padronizado","Complete nível apenas com água deionizada (quando indicado)","Use EPI adequado no manuseio da bateria"],warnings:["Nunca recarregue bateria em local fechado sem ventilação ou próximo de fonte de ignição"]}]},{id:"manuseio-cargas",title:"Manuseio de Cargas",icon:"📦",description:"Técnicas de empilhamento, estabilidade de cargas, paletes e cargas especiais.",color:"from-green-500 to-green-600",lessons:[{id:"mc-1",title:"Estabilidade e Centro de Gravidade",content:["O triângulo de estabilidade é formado pelos dois pontos das rodas dianteiras e o ponto central do eixo traseiro.","O centro de carga combinado (equipamento + carga) deve permanecer dentro do triângulo de estabilidade.","Quanto mais alta a carga, menor a estabilidade — reduza a velocidade e evite movimentos bruscos.","O peso da carga nunca deve exceder a capacidade nominal indicada na placa da empilhadeira.","A distância do centro de carga afeta a capacidade: quanto mais distante, menor a capacidade efetiva.","Cargas longas, largas ou irregulares exigem cuidados especiais e podem requerer acessórios adequados."],highlights:["Entenda o triângulo de estabilidade da empilhadeira","Carga mais alta = menos estabilidade","Nunca exceda a capacidade nominal do equipamento"],warnings:["Atenção: a capacidade diminui quando o centro de carga está mais afastado dos garfos"]},{id:"mc-2",title:"Técnicas de Empilhamento",content:["Aproxime-se do palete de frente, centralizado e em velocidade reduzida.","Ajuste a abertura dos garfos para se adequar ao palete — os garfos devem ficar o mais afastados possível entre si.","Insira os garfos completamente no palete antes de elevar a carga.","Eleve a carga suavemente, verificando se está estável e equilibrada.","Ao empilhar, aproxime-se lentamente, eleve até ultrapassar a altura do nível desejado, incline o mastro para frente e abaixe suavemente.","Verifique se a prateleira ou estrutura suporta o peso da carga antes de depositá-la.","Ao retirar cargas de prateleiras altas, eleve os garfos primeiro, depois recue lentamente."],highlights:["Centralize os garfos no palete antes de elevar","Insira os garfos COMPLETAMENTE no palete","Verifique a capacidade da prateleira antes de empilhar","Movimentos suaves e controlados em todas as operações"]},{id:"mc-3",title:"Cargas Especiais e Irregulares",content:["Bobinas de papel/aço: utilize acessório apropriado (grampos para bobinas) e nunca transporte sem o acessório adequado.","Tambores e cilindros: use o acessório específico e transporte na posição vertical com inclinação para trás.","Cargas longas (tubos, barras): utilize extensão de garfos e transporte com a carga voltada para trás em rampas.","Cargas frágeis: reduza a velocidade, evite frenagens bruscas e use amortecedores quando necessário.","Cargas perigosas (produtos químicos): siga as normas de manuseio e transporte de produtos perigosos.","Para qualquer carga fora do padrão, consulte o supervisor antes de operar."],highlights:["Use sempre o acessório adequado para cada tipo de carga","Cargas longas exigem extensões de garfos","Consulte o supervisor para cargas fora do padrão"],warnings:["Nunca improvise acessórios ou adaptações nos garfos"]},{id:"mc-4",title:"Retirada e Colocação de Cargas (Passo a Passo)",content:["Na retirada da carga: aproxime alinhado, garfos na horizontal, insira completamente, eleve de forma suave, estabilize com inclinação adequada e recue com cuidado.","Após retirar, mantenha a carga a aproximadamente 15-20 cm do piso para transporte, com velocidade reduzida e visão desobstruída.","Na colocação: alinhe com precisão ao porta-paletes, eleve um pouco acima do nível final, avance de forma controlada e desça lentamente até acomodar a carga.","Antes de sair, garanta que os garfos estão livres, recue cuidadosamente e retorne para posição de condução segura.","Evite qualquer rotação com carga elevada em corredor, pois esse comportamento aumenta muito o risco de tombamento.","Observe risco de carga instável, quebra de palete, vazamento hidráulico e desmoronamento da estrutura durante toda a movimentação."],highlights:["Retire e deposite carga com movimentos suaves e controlados","Transporte com carga baixa (15-20 cm)","Nunca faça giro em corredor com carga elevada"],warnings:["Movimentação brusca durante retirada/colocação pode derrubar carga e tombar o equipamento"]}]},{id:"normas-nr11",title:"Normas Regulamentadoras (NR-11)",icon:"📋",description:"Conteúdo de reciclagem NR-11 com foco em formação de operador, responsabilidades legais e operação segura.",color:"from-purple-500 to-purple-600",lessons:[{id:"nr-1",title:"Projeto de Formação e Reciclagem do Operador",content:["A formação de operador de empilhadeira é estruturada para habilitar, certificar e reciclar profissionais com foco em segurança e produtividade.","No material de reciclagem, o curso está organizado em módulo teórico (8 horas) e módulo prático (8 horas), com certificação condicionada ao desempenho.","Para participar da formação, o operador deve ser aprovado em avaliações prévias como psicossocial, exames complementares e exame clínico ocupacional.","A nota mínima para certificação é 7,0 em cada etapa avaliativa, reforçando o critério de aptidão técnica e comportamental.","Após convocação para vaga, há estágio supervisionado obrigatório com avaliação formal de aptidão antes da atuação autônoma.","A reciclagem periódica mantém o operador atualizado em procedimentos técnicos e de segurança, reduzindo risco operacional."],highlights:["Formação combinando teoria + prática","Nota mínima 7,0 para certificação","Estágio supervisionado é obrigatório","Reciclagem periódica mantém habilitação segura"],warnings:["Sem formação e reciclagem adequadas, o risco de acidentes e responsabilizações aumenta significativamente"]},{id:"nr-2",title:"Responsabilidades Legais do Operador e da Empresa",content:["Acidentes com empilhadeira geralmente envolvem falhas de treinamento, falta de experiência, descumprimento de normas e ausência de manutenção.","O operador e o empregador podem responder civil, penal e trabalhistamente em casos de negligência, imprudência ou imperícia.","No âmbito civil, causar dano por ação ou omissão gera dever de reparação, inclusive com responsabilidade do empregador por atos dos empregados.","No âmbito penal, expor pessoas a risco grave ou provocar acidente por inobservância técnica pode gerar detenção ou reclusão.","No âmbito trabalhista, podem ocorrer advertência, suspensão e demissão por justa causa ao empregado, além de multa/embargo/interdição à empresa.","A cultura de segurança exige disciplina operacional diária, respeito às normas e comunicação imediata de desvios."],highlights:["Quem cria o risco responde legalmente por seus atos","Empresa e operador compartilham responsabilidades","Segurança operacional também é obrigação jurídica"],warnings:["Operar sem treinamento, sem manutenção e sem seguir procedimento pode gerar acidente grave e responsabilização civil/criminal"]},{id:"nr-3",title:"Requisitos da NR-11 e Obrigações Operacionais",content:["A NR-11 determina que operadores de equipamentos motorizados recebam treinamento específico fornecido pela empresa para habilitação na função.","O operador deve portar identificação visível durante a jornada e manter revalidação periódica conforme exigência médica ocupacional.","Somente pessoas autorizadas e capacitadas podem operar a empilhadeira; é proibido permitir uso por terceiros não habilitados.","É proibido transportar ou elevar pessoas com empilhadeira, salvo equipamentos especificamente projetados e autorizados para essa finalidade.","Defeitos técnicos, danos e condições inseguras devem ser comunicados imediatamente; equipamento sem condição segura deve ser interditado.","Na rotina operacional, devem ser observados limite de carga, estabilidade, inspeção pré-uso, sinalização e regras de circulação interna."],highlights:["Treinamento específico é obrigatório para operar","Identificação e aptidão médica devem estar válidas","Equipamento inseguro deve ser retirado de operação","É proibido transportar pessoas na empilhadeira"],warnings:["Ignorar requisito da NR-11 compromete a segurança e pode invalidar a habilitação operacional"]},{id:"nr-4",title:"NR-11 na Prática: Inspeção, Armazenagem e Ambiente",content:["A NR-11 reforça que equipamentos de transporte motorizado devem ter buzina funcional e inspeção permanente, com troca imediata de peças defeituosas.","Em locais fechados sem ventilação adequada, a operação com motor de combustão interna é proibida sem sistema neutralizador apropriado.","Na armazenagem, a carga não pode exceder a capacidade do piso e não deve obstruir portas, saídas de emergência ou equipamentos contra incêndio.","Materiais empilhados devem manter afastamento das estruturas laterais, conforme referência normativa de segurança do local.","A capacidade máxima de trabalho do equipamento deve estar visível, e as condições de uso devem ser verificadas antes de cada turno.","Conformidade normativa não é apenas documentação: ela orienta conduta operacional e previne acidentes graves."],highlights:["Buzina, inspeção e manutenção são exigências normativas","Armazenagem deve respeitar capacidade do piso e rotas de emergência","Em ambiente fechado, controle de emissões é obrigatório"],warnings:["Descumprir requisitos de armazenagem e ventilação pode gerar acidente, autuação e interdição"]}]},{id:"direcao-defensiva",title:"Direção Defensiva",icon:"🚗",description:"Técnicas de direção defensiva aplicadas à operação de empilhadeiras.",color:"from-teal-500 to-teal-600",lessons:[{id:"dd-1",title:"Princípios da Direção Defensiva",content:["Direção defensiva na empilhadeira significa antecipar situações de risco e agir preventivamente.","Mantenha sempre atenção total — o uso de celular durante a operação é PROIBIDO.","Observe constantemente o ambiente: pedestres, outros equipamentos, obstáculos e condições do piso.","Nunca opere sob influência de álcool, drogas ou medicamentos que causem sonolência.","Descanse adequadamente entre os turnos — a fadiga é uma das principais causas de acidentes.","Ajuste os espelhos retrovisores antes de iniciar a operação e verifique-os constantemente."],highlights:["Celular durante a operação é PROIBIDO","Nunca opere sob influência de álcool ou drogas","Mantenha atenção total ao ambiente o tempo todo"],warnings:["A fadiga compromete seus reflexos — descanse adequadamente"]},{id:"dd-2",title:"Condições Adversas",content:["Piso molhado: reduza a velocidade em pelo menos 50%, evite frenagens bruscas e aumente a distância de segurança.","Piso irregular: reduza a velocidade e evite transportar cargas elevadas em superfícies desniveladas.","Visibilidade reduzida (poeira, fumaça, pouca luz): use faróis, buzine com frequência e reduza a velocidade.","Áreas congestionadas: opere em velocidade mínima, use sinais sonoros e mantenha distância segura.","Operação noturna: verifique o funcionamento de todos os faróis e luzes de advertência.","Em áreas externas com chuva, redobre a atenção e evite operações desnecessárias."],highlights:["Piso molhado: reduza a velocidade em 50%","Visibilidade reduzida: use faróis e buzine com frequência","Verifique faróis e luzes antes de operar no período noturno"]},{id:"dd-3",title:"Marcha à Ré e Manobras",content:["Sempre olhe na direção em que está se movimentando — ao dar ré, vire o corpo e olhe diretamente para trás.","Antes de dar ré, verifique se não há obstáculos, pedestres ou outros equipamentos atrás de você.","Use o alarme de ré (se equipado) e buzine antes de iniciar a marcha à ré.","Evite dar ré em rampas — se necessário, desça a carga e manobre com segurança.","Em corredores estreitos, desça os garfos ao nível de transporte e proceda com extrema cautela.","Sempre que possível, prefira manobras de frente — a marcha à ré deve ser evitada quando possível."],highlights:["Ao dar ré, OLHE diretamente para trás","Verifique a área antes de dar ré","Prefira manobras de frente sempre que possível","Use o alarme de ré e buzine antes de manobrar"],warnings:["Evite dar ré em rampas — risco de tombamento"]},{id:"dd-4",title:"Aclives, Declives e Condição do Piso",content:["Em rampas, a carga deve ser transportada no sentido ascendente, mantendo controle total de velocidade e aderência.","Não é permitido iniciar manobra em diagonal, mudar direção em aclive/declive ou estacionar o equipamento em inclinação.","Quando necessário em emergência, use calços para impedir deslocamento involuntário do equipamento.","Não execute coleta ou descarga de materiais com a máquina posicionada em subida ou descida.","A qualidade do piso impacta diretamente a estabilidade: superfícies irregulares, oleosas ou com resíduos aumentam risco de derrapagem e capotamento.","Operação defensiva em rampa exige velocidade reduzida, planejamento de rota e observação contínua do entorno."],highlights:["Carga sempre no sentido ascendente em rampas","Sem mudança de direção em aclive/declive","Piso ruim exige redução de velocidade e atenção redobrada"],warnings:["Rampa com carga elevada ou manobra indevida é cenário clássico de tombamento"]}]}],ih=[{id:"default-1",title:"Como Operar uma Empilhadeira — Passo a Passo Completo",description:"Aula completa mostrando todos os passos para operar uma empilhadeira com segurança, desde a inspeção pré-operacional até a operação em armazém.",url:"https://www.youtube.com/watch?v=TqkSIznHgkc",category:"operacao",duration:"15:30",addedAt:Date.now()-1e5},{id:"default-2",title:"Inspeção Diária da Empilhadeira — Checklist Visual",description:"Demonstração prática de como realizar a inspeção diária antes de operar, verificando freios, pneus, garfos, sistema hidráulico e muito mais.",url:"https://www.youtube.com/watch?v=dQw4w9WgXcQ",category:"manutencao",duration:"10:45",addedAt:Date.now()-2e5},{id:"default-3",title:"Estabilidade e Triângulo de Estabilidade",description:"Explicação visual do triângulo de estabilidade da empilhadeira e como evitar tombamentos durante a operação com cargas.",url:"https://www.youtube.com/watch?v=dQw4w9WgXcQ",category:"seguranca",duration:"12:20",addedAt:Date.now()-3e5},{id:"default-4",title:"Manuseio de Cargas Pesadas — Técnicas Avançadas",description:"Técnicas profissionais para manusear cargas pesadas e volumosas com segurança, incluindo posicionamento, elevação e transporte.",url:"https://www.youtube.com/watch?v=dQw4w9WgXcQ",category:"cargas",duration:"18:00",addedAt:Date.now()-4e5},{id:"default-5",title:"Direção Defensiva com Empilhadeira em Armazém",description:"Como aplicar técnicas de direção defensiva ao uestion:"Qual item abaixo é não negociável na operação?",options:["Luva opcional","Cinto de segurança","Colete apenas à noite","Capacete apenas externo"],correctAnswer:1,explanation:"O cinto é essencial, especialmente em risco de tombamento."},"seg-2":{moduleId:"seguranca",lessonId:"seg-2",question:"Em cruzamentos com baixa visibilidade, o operador deve:",options:["Acelerar para liberar a via","Buzinar e reduzir velocidade","Seguir sem sinalizar","Parar e desligar a empilhadeira"],correctAnswer:1,explanation:"Sinalização sonora e velocidade controlada são práticas obrigatórias de prevenção."},"seg-3":{moduleId:"seguranca",lessonId:"seg-3",question:"No primeiro momento de um acidente, a prioridade é:",options:["Continuar operação para não parar o fluxo","Desligar, isolar área e acionar apoio","Mover a carga para área livre","Registrar depois do turno"],correctAnswer:1,explanation:"Interromper a operação e proteger pessoas e área é o procedimento correto."},"seg-4":{moduleId:"seguranca",lessonId:"seg-4",question:"Ao identificar pedestres na zona de perigo, o operador deve:",options:["Apenas buzinar e continuar","Parar imediatamente a operação","Acelerar para liberar o corredor","Solicitar que desviem sem parar a máquina"],correctAnswer:1,explanation:"Presença de pedestres em área de risco exige interrupção imediata da operação."},"man-1":{moduleId:"manutencao",lessonId:"man-1",question:"Quando deve ser feita a inspeção pré-operacional?",options:["Uma vez por semana","Antes de cada turno","Somente em equipamento novo","Quando o supervisor pedir"],correctAnswer:1,explanation:"A inspeção pré-operacional é obrigatória em todo início de turno."},"man-2":{moduleId:"manutencao",lessonId:"man-2",question:"Ao recarregar bateria de empilhadeira elétrica, o local deve ser:",options:["Fechado para evitar poeira","Ventilado e longe de ignição","Próximo a materiais inflamáveis","Qualquer local disponível"],correctAnswer:1,explanation:"Ventilação e controle de fontes de ignição reduzem risco de acidente."},"man-3":{moduleId:"manutencao",lessonId:"man-3",question:"A manutenção corretiva deve ser feita por:",options:["Qualquer operador com experiência","Pessoal qualificado e autorizado","Somente o líder de turno","Equipe administrativa"],correctAnswer:1,explanation:"Somente técnicos qualificados devem executar manutenção corretiva."},"man-4":{moduleId:"manutencao",lessonId:"man-4",question:"Qual ação está correta no cuidado com bateria tracionária?",options:["Recarregar próximo a fonte de calor","Usar água deionizada conforme indicação do fabricante","Desconectar bateria com equipamento ligado","Guardar objetos sobre a bateria"],correctAnswer:1,explanation:"O nível deve ser corrigido com água deionizada quando indicado e seguindo procedimento seguro."},"mc-1":{moduleId:"manuseio-cargas",lessonId:"mc-1",question:"O centro de carga impacta diretamente:",options:["A cor do equipamento","A estabilidade e a capacidade efetiva","Somente o consumo de combustível","A velocidade máxima permitida"],correctAnswer:1,explanation:"Quanto mais distante o centro de carga, menor a capacidade efetiva e estabilidade."},"mc-2":{moduleId:"manuseio-cargas",lessonId:"mc-2",question:"Antes de elevar a carga, os garfos devem estar:",options:["Parcialmente inseridos no palete","Totalmente inseridos e centralizados","Inclinados para frente","No ponto mais alto"],correctAnswer:1,explanation:"Inserção total e centralização evitam queda e desequilíbrio da carga."},"mc-3":{moduleId:"manuseio-cargas",lessonId:"mc-3",question:"Para cargas especiais (bobinas/tambores), o operador deve:",options:["Improvisar nos garfos","Usar acessório específico adequado","Reduzir velocidade apenas","Transportar sem inclinar"],correctAnswer:1,explanation:"Cargas especiais exigem acessórios corretos para segurança e estabilidade."},"mc-4":{moduleId:"manuseio-cargas",lessonId:"mc-4",question:"Durante a movimentação em corredor, é proibido:",options:["Manter carga a 15-20 cm do solo","Girar com carga elevada","Alinhar antes de depositar a carga","Recuar com cautela"],correctAnswer:1,explanation:"Rotação com carga elevada em corredor aumenta muito o risco de tombamento."},"nr-1":{moduleId:"normas-nr11",lessonId:"nr-1",question:"No conteúdo de formação do operador, qual estrutura foi destacada para certificação?",options:["Apenas 16h teóricas","8h teóricas + 8h práticas","Somente estágio supervisionado","Apenas prova final online"],correctAnswer:1,explanation:"A formação apresentada no material de reciclagem combina módulo teórico e módulo prático (16h totais)."},"nr-2":{moduleId:"normas-nr11",lessonId:"nr-2",question:"Em caso de negligência com acidente, a responsabilidade pode atingir:",options:["Somente o operador","Operador e empregador, conforme o caso","Apenas o setor de manutenção","Ninguém, se não houver intenção"],correctAnswer:1,explanation:"A legislação civil, penal e trabalhista pode responsabilizar tanto o agente direto quanto o empregador, conforme o contexto."},"nr-3":{moduleId:"normas-nr11",lessonId:"nr-3",question:"Qual conduta está alinhada à NR-11 e ao material de reciclagem?",options:["Permitir operação por colega não habilitado","Interditar equipamento sem condição segura","Transportar pessoas nos garfos em trajetos curtos","Operar sem identificação visível"],correctAnswer:1,explanation:"Equipamento com falha ou risco deve ser retirado de operação até correção adequada."},"nr-4":{moduleId:"normas-nr11",lessonId:"nr-4",question:"Segundo a NR-11, em área fechada sem ventilação, equipamento a combustão:",options:["Pode operar normalmente","Depende de neutralizador adequado","Pode operar somente à noite","Só precisa reduzir velocidade"],correctAnswer:1,explanation:"A norma restringe uso em ambiente fechado sem ventilação, salvo com neutralização apropriada."},"dd-1":{moduleId:"direcao-defensiva",lessonId:"dd-1",question:"Qual comportamento faz parte da direção defensiva?",options:["Uso de celular para comunicação","Antecipar riscos e manter ate
